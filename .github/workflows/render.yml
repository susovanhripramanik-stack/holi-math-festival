name: Render Holi Math Festival

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    container:
      image: manimcommunity/manim:stable
      options: --user root

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Render animation
      run: |
        manim -ql holi_math_festival.py HoliMathFestival

    - name: Upload video
      uses: actions/upload-artifact@v4
      with:
        name: holi-math-festival-video
        path: media/
